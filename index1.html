<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇮🇹 Sicily Villa Hunt · May 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c14;
  --surface: #0f1623;
  --surface2: #18202f;
  --border: #232d40;
  --text: #eef2f8;
  --muted: #7a8a9e;
  --accent: #f0a500;
  --accent-dim: rgba(240,165,0,0.12);
  --green: #22c55e;
  --red: #f87171;
  --airbnb: #ff385c;
  --vrbo: #2563eb;
  --agency: #9333ea;
  --r: 14px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ─── HERO ─── */
.hero{
  background:linear-gradient(160deg,#050812 0%,#0d1a3a 45%,#0a1f2e 100%);
  padding:72px 24px 52px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(240,165,0,.07) 0%,transparent 70%);
}
.hero::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(240,165,0,.3),transparent);
}
.hero-flag{font-size:52px;margin-bottom:20px;display:block;filter:drop-shadow(0 0 30px rgba(240,165,0,.4))}
.hero h1{
  font-size:clamp(38px,7vw,76px);font-weight:900;
  letter-spacing:-3px;line-height:1;margin-bottom:16px;
  background:linear-gradient(135deg,#fff 30%,var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-sub{font-size:18px;color:var(--muted);margin-bottom:36px;font-weight:400}
.pills{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.pill{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);
  border-radius:100px;padding:9px 18px;font-size:13px;font-weight:500;
  display:flex;align-items:center;gap:7px;
}
.pill span{opacity:.5}

/* ─── CONTROLS ─── */
.controls{max-width:1380px;margin:0 auto;padding:32px 24px 16px;display:flex;flex-direction:column;gap:14px}
.ctrl-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ctrl-label{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);width:44px;flex-shrink:0}
.fbtn{
  background:var(--surface);border:1px solid var(--border);color:var(--muted);
  border-radius:100px;padding:7px 16px;font-size:13px;font-weight:500;
  cursor:pointer;transition:.2s;font-family:inherit;
}
.fbtn:hover{border-color:rgba(240,165,0,.4);color:var(--text)}
.fbtn.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.sbtn{
  background:var(--surface);border:1px solid var(--border);color:var(--muted);
  border-radius:8px;padding:7px 14px;font-size:13px;font-weight:500;
  cursor:pointer;transition:.2s;font-family:inherit;
}
.sbtn.on{background:var(--surface2);color:var(--text);border-color:rgba(255,255,255,.15)}

/* ─── RESULTS BAR ─── */
.rbar{max-width:1380px;margin:0 auto;padding:8px 24px 20px;display:flex;justify-content:space-between;align-items:center}
.rcount{font-size:13px;color:var(--muted)}
.rcount strong{color:var(--text)}
.legend{display:flex;gap:14px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.dot{width:8px;height:8px;border-radius:50%}

/* ─── GRID ─── */
.grid{
  max-width:1380px;margin:0 auto;padding:0 24px 120px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:22px;
}

/* ─── CARD ─── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;
  transition:transform .3s cubic-bezier(.2,.8,.2,1),box-shadow .3s,border-color .3s;
  position:relative;display:flex;flex-direction:column;
}
.card:hover{transform:translateY(-5px);box-shadow:0 24px 70px rgba(0,0,0,.5);border-color:rgba(240,165,0,.25)}
.card.hidden{display:none}

/* CARD IMAGE */
.cimg{position:relative;height:218px;overflow:hidden;flex-shrink:0}
.cimg img{width:100%;height:100%;object-fit:cover;transition:transform .6s}
.card:hover .cimg img{transform:scale(1.07)}
.cimg-ov{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 35%,rgba(4,9,20,.75))}
.rank{
  position:absolute;top:13px;left:13px;
  background:var(--accent);color:#000;font-weight:900;font-size:12px;
  width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
}
.pbadge{
  position:absolute;top:13px;right:13px;
  padding:4px 11px;border-radius:100px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;
}
.pbadge.airbnb{background:var(--airbnb);color:#fff}
.pbadge.vrbo{background:var(--vrbo);color:#fff}
.pbadge.agency{background:var(--agency);color:#fff}
.sbadge{
  position:absolute;bottom:13px;left:13px;
  background:rgba(4,9,20,.75);backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.1);border-radius:100px;
  padding:4px 11px;font-size:11px;font-weight:600;color:var(--accent);
}
.vbtn{
  position:absolute;bottom:13px;right:13px;
  background:rgba(4,9,20,.65);backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.12);border-radius:100px;
  padding:6px 13px;font-size:12px;font-weight:600;color:var(--text);
  cursor:pointer;transition:.2s;display:flex;align-items:center;gap:5px;
}
.vbtn:hover{background:rgba(255,56,92,.15);border-color:var(--airbnb)}
.vbtn.on{background:rgba(255,56,92,.18);border-color:var(--airbnb);color:var(--airbnb)}

/* CARD BODY */
.cbody{padding:20px;flex:1;display:flex;flex-direction:column;gap:0}
.cloc{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.cname{font-size:18px;font-weight:800;line-height:1.25;margin-bottom:3px}
.csub{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.4}
.cmeta{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px}
.cmeta-i{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px}
.stars{color:var(--accent)}

/* DATE NOTE */
.dnote{
  font-size:12px;background:rgba(240,165,0,.08);border:1px solid rgba(240,165,0,.2);
  border-radius:8px;padding:7px 11px;color:var(--accent);margin-bottom:12px;line-height:1.4;
}

/* PRICE */
.cprice{display:flex;align-items:baseline;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.price-orig{font-size:15px;color:var(--muted);text-decoration:line-through}
.price-total{font-size:30px;font-weight:900;color:var(--green)}
.price-nt{font-size:12px;color:var(--muted);margin-left:auto;align-self:center}
.over-tag{font-size:10px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:var(--red);border-radius:100px;padding:2px 9px}

/* TAGS */
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.tag{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:11px;color:var(--muted)}
.tag.g{background:rgba(34,197,94,.07);border-color:rgba(34,197,94,.2);color:var(--green)}

/* WHY */
.why-wrap{margin-top:auto}
.why-btn{
  background:none;border:none;color:var(--accent);font-size:12px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;padding:0;
}
.why-txt{
  display:none;margin-top:11px;padding:13px;
  background:var(--surface2);border-radius:10px;border-left:3px solid var(--accent);
  font-size:13px;color:var(--muted);line-height:1.65;
}
.why-txt.open{display:block}

/* CARD FOOTER */
.cfoot{padding:0 20px 20px}
.book-btn{
  display:block;width:100%;background:var(--accent);color:#000;
  border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:800;
  cursor:pointer;text-decoration:none;text-align:center;transition:.2s;font-family:inherit;
}
.book-btn:hover{background:#fbbf24;transform:translateY(-1px)}

/* ─── FAV BAR ─── */
.favbar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(8,12,20,.94);backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  padding:14px 24px;display:flex;align-items:center;gap:16px;
  transform:translateY(100%);transition:transform .35s cubic-bezier(.2,.8,.2,1);
  z-index:200;
}
.favbar.show{transform:translateY(0)}
.fav-lbl{font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap}
.fav-items{display:flex;gap:8px;flex-wrap:wrap;flex:1}
.fav-chip{
  background:rgba(255,56,92,.12);border:1px solid rgba(255,56,92,.3);
  color:#ff6b8a;padding:4px 12px;border-radius:100px;font-size:12px;font-weight:600;
}
.fav-clear{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:5px 14px;font-size:12px;cursor:pointer;font-family:inherit;transition:.2s}
.fav-clear:hover{color:var(--text);border-color:rgba(255,255,255,.2)}

/* ─── RESPONSIVE ─── */
@media(max-width:768px){
  .grid{grid-template-columns:1fr;padding:0 16px 120px}
  .hero{padding:56px 20px 40px}
  .hero h1{letter-spacing:-2px}
  .controls,.rbar{padding-left:16px;padding-right:16px}
  .ctrl-label{display:none}
}
</style>
</head>

let filterArea = 'all';
let filterBeds = 'all';
let sortBy = 'price';
let votes = {};

function render(){
  let list = VILLAS.filter(v => {
    const a = filterArea === 'all' || v.area === filterArea;
    const b = filterBeds === 'all'
      || (filterBeds === '3' && v.beds === 3)
      || (filterBeds === '4' && v.beds === 4)
      || (filterBeds === '5' && v.beds >= 5);
    return a && b;
  });

  if(sortBy === 'price') list.sort((a,b) => a.price - b.price);
  else if(sortBy === 'rating') list.sort((a,b) => (b.rating||0)-(a.rating||0));
  else if(sortBy === 'votes') list.sort((a,b) => (votes[b.id]?1:0)-(votes[a.id]?1:0));

  document.getElementById('rnum').textContent = list.length;

  document.getElementById('grid').innerHTML = list.map(v => {
    const voted = !!votes[v.id];
    const rat = v.platform === 'vrbo'
      ? (v.rating ? `<span class="stars">${'★'.repeat(5)}</span> ${v.rating}/10 (${v.reviews})` : '—')
      : (v.rating ? `<span class="stars">${'★'.repeat(Math.round(v.rating))}</span> ${v.rating} (${v.reviews})` : '<span style="color:var(--muted)">New listing</span>');

    const priceRow = `
      ${v.orig ? `<span class="price-orig">€${v.orig.toLocaleString()}</span>` : ''}
      <span class="price-total">€${v.price.toLocaleString()}</span>
      ${v.over ? `<span class="over-tag">slightly over €3k</span>` : ''}
      <span class="price-nt">≈ €${v.ppn}/night</span>
    `;

    const tagsHtml = v.tags.map(t => `<span class="tag">${t}</span>`).join('');

    return `
    <div class="card" data-id="${v.id}" data-area="${v.area}" data-beds="${v.beds}">
      <div class="cimg">
        <img src="${v.img}" alt="${v.name}" loading="lazy">
        <div class="cimg-ov"></div>
        <div class="rank">#${v.rank}</div>
        <div class="pbadge ${v.platform}">${v.platform === 'agency' ? 'Agency' : v.platform.toUpperCase()}</div>
        ${v.hl ? `<div class="sbadge">${v.hl}</div>` : ''}
        <button class="vbtn ${voted?'on':''}" onclick="vote(${v.id},'${v.name.replace(/'/g,"\\'")}')">
          ${voted ? '❤️ Voted' : '🤍 Love it'}
        </button>
      </div>
      <div class="cbody">
        <div class="cloc">📍 ${v.loc}</div>
        <div class="cname">${v.name}</div>
        <div class="csub">${v.sub}</div>
        <div class="cmeta">
          <span class="cmeta-i">🛏️ ${v.beds} bed${v.beds>1?'s':''}</span>
          <span class="cmeta-i">👥 Sleeps ${v.sleeps}</span>
          <span class="cmeta-i">${rat}</span>
        </div>
        ${v.dnote ? `<div class="dnote">${v.dnote}</div>` : ''}
        <div class="cprice">${priceRow}</div>
        <div class="tags">${tagsHtml}</div>
        <div class="why-wrap">
          <button class="why-btn" onclick="toggleWhy(${v.id},this)">💬 Why we included this ▾</button>
          <div class="why-txt" id="why${v.id}">${v.why}</div>
        </div>
      </div>
      <div class="cfoot">
        <a href="${v.link}" target="_blank" class="book-btn">View & Book →</a>
      </div>
    </div>`;
  }).join('');
}

function toggleWhy(id, btn){
  const el = document.getElementById('why'+id);
  el.classList.toggle('open');
  btn.innerHTML = el.classList.contains('open')
    ? '💬 Why we included this ▴'
    : '💬 Why we included this ▾';
}

function vote(id, name){
  if(votes[id]) delete votes[id];
  else votes[id] = name;
  render();
  updateFavBar();
}

function clearVotes(){
  votes = {};
  render();
  updateFavBar();
}

function updateFavBar(){
  const bar = document.getElementById('favbar');
  const items = document.getElementById('fav-items');
  const faves = Object.values(votes);
  if(faves.length){
    bar.classList.add('show');
    items.innerHTML = faves.map(n => `<span class="fav-chip">❤️ ${n}</span>`).join('');
  } else {
    bar.classList.remove('show');
  }
}

function setFilter(btn, type, val){
  const row = btn.closest('.ctrl-row');
  row.querySelectorAll('.fbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  if(type === 'area') filterArea = val;
  else filterBeds = val;
  render();
}

function setSort(btn, val){
  document.querySelectorAll('.sbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  sortBy = val;
  render();
}

render();
</script>
