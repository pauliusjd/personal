<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VDU Botanikos sodas — Conifer Catalog 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4eee2;--bg-soft:#ebe2d0;--paper:#fbf6ec;--ink:#1f2419;--ink-soft:#4a4f3f;--rule:#b6ad94;--accent:#4f6437;--shadow:rgba(31,36,25,0.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
header{padding:60px 40px 40px;border-bottom:1px solid var(--rule);text-align:center;background:linear-gradient(180deg,var(--paper),transparent)}
.eyebrow{font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:16px}
h1{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(36px,6vw,64px);line-height:1.05;margin-bottom:8px}
h1 em{font-style:italic;font-weight:400;color:var(--accent)}
.subtitle{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;color:var(--ink-soft);max-width:640px;margin:0 auto 24px}
.meta{display:flex;justify-content:center;gap:32px;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink-soft);flex-wrap:wrap}
.meta span strong{color:var(--ink);font-weight:600}
.controls{position:sticky;top:0;z-index:50;background:rgba(244,238,226,0.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--rule);padding:20px 40px;display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.search-wrap{flex:1;min-width:260px;position:relative}
.search-wrap::before{content:"⌕";position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--ink-soft)}
input[type="text"]{width:100%;padding:12px 16px 12px 40px;border:1px solid var(--rule);background:var(--paper);font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--ink);outline:none}
input[type="text"]:focus{border-color:var(--accent)}
.filter-group{display:flex;gap:4px;border:1px solid var(--rule);background:var(--paper);padding:4px}
.filter-btn{padding:8px 14px;border:none;background:transparent;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--ink-soft);cursor:pointer;transition:all 0.2s}
.filter-btn:hover{color:var(--ink)}
.filter-btn.active{background:var(--ink);color:var(--paper)}
.price-filter{display:flex;align-items:center;gap:12px;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--ink-soft)}
.price-filter input[type="range"]{width:140px;accent-color:var(--accent)}
.price-value{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--ink);min-width:60px}
.results-count{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink-soft);margin-left:auto}
.results-count strong{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;color:var(--accent);margin-right:6px;letter-spacing:0}
main{padding:40px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:28px;max-width:1600px;margin:0 auto}
.card{background:var(--paper);border:1px solid var(--rule);overflow:hidden;display:flex;flex-direction:column;transition:transform 0.3s,box-shadow 0.3s;position:relative}
.card:hover{transform:translateY(-3px);box-shadow:0 16px 32px var(--shadow)}
.card-num{position:absolute;top:12px;left:12px;z-index:2;background:var(--paper);padding:4px 10px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:var(--ink-soft);border:1px solid var(--rule)}
.card-price{position:absolute;top:12px;right:12px;z-index:2;background:var(--ink);color:var(--paper);padding:6px 12px;font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500}
.card-price em{font-size:11px;font-style:normal;letter-spacing:0.1em;margin-left:2px;opacity:0.7}
.card-img-wrap{aspect-ratio:4/3;overflow:hidden;background:var(--bg-soft);position:relative}
.card-img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s}
.card:hover .card-img{transform:scale(1.05)}
.card-body{padding:20px;flex:1;display:flex;flex-direction:column}
.card-lt{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
.card-name{font-family:'Cormorant Garamond',serif;font-size:22px;line-height:1.15;font-weight:500;margin-bottom:4px}
.card-cv{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;color:var(--accent);margin-bottom:14px;line-height:1.25}
.card-spec{margin-top:auto;padding-top:14px;border-top:1px dashed var(--rule);display:flex;justify-content:space-between;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-soft)}
.card-spec strong{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;letter-spacing:0;color:var(--ink);text-transform:none;font-weight:500}
.empty{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--ink-soft)}
.empty p:first-child{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:32px;color:var(--ink);margin-bottom:12px}
footer{border-top:1px solid var(--rule);padding:40px;text-align:center;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink-soft);margin-top:40px}
footer a{color:inherit}
@media (max-width:700px){header{padding:40px 20px 30px}.controls{padding:16px 20px}main{padding:20px}.meta{gap:16px}}
</style>
</head>

const grid=document.getElementById('grid'),search=document.getElementById('search'),priceRange=document.getElementById('price-range'),priceDisplay=document.getElementById('price-display'),countEl=document.getElementById('count'),filterButtons=document.querySelectorAll('.filter-btn');
let activeGenus='all',activePrice=120,activeSearch='';
function fb(name){const i=name.charAt(0).toUpperCase();return "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 300'><rect width='400' height='300' fill='%23ebe2d0'/><text x='50%25' y='50%25' font-family='Cormorant Garamond,serif' font-style='italic' font-size='120' fill='%234f6437' text-anchor='middle' dominant-baseline='central'>"+i+"</text></svg>"}
function render(){
const term=activeSearch.toLowerCase().trim();
const filtered=PLANTS.filter(p=>{
const gm=activeGenus==='all'||(activeGenus==='other'?!['Picea','Juniperus','Thuja','Chamaecyparis','Pinus'].includes(p.genus):p.genus===activeGenus);
const pm=p.price<=activePrice;
const sm=!term||p.lt.toLowerCase().includes(term)||p.name.toLowerCase().includes(term)||p.latin.toLowerCase().includes(term)||p.cv.toLowerCase().includes(term)||p.genus.toLowerCase().includes(term);
return gm&&pm&&sm;
});
countEl.textContent=filtered.length;
if(filtered.length===0){grid.innerHTML='<div class="empty"><p>Nothing found.</p><p>Try a different search or adjust the filters.</p></div>';return}
grid.innerHTML=filtered.map(p=>'<article class="card"><div class="card-num">№ '+String(p.n).padStart(2,'0')+'</div><div class="card-price">'+p.price.toFixed(2)+'<em>€</em></div><div class="card-img-wrap"><img class="card-img" loading="lazy" referrerpolicy="no-referrer" src="'+p.img+'" alt="'+p.latin+'" onerror="this.src=\''+fb(p.latin)+'\'" /></div><div class="card-body"><div class="card-lt">'+p.lt+'</div><div class="card-name">'+p.name+'</div><div class="card-cv"><em>'+p.latin+'</em>'+(p.cv?' &lsquo;'+p.cv+'&rsquo;':'')+'</div><div class="card-spec"><span>Size</span><strong>'+p.size+'</strong></div></div></article>').join('');
}
search.addEventListener('input',e=>{activeSearch=e.target.value;render()});
priceRange.addEventListener('input',e=>{activePrice=parseInt(e.target.value);priceDisplay.textContent=activePrice;render()});
filterButtons.forEach(b=>b.addEventListener('click',()=>{filterButtons.forEach(x=>x.classList.remove('active'));b.classList.add('active');activeGenus=b.dataset.genus;render()}));
render();
</script>
